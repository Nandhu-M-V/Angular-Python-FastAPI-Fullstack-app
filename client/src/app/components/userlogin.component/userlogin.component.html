<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-gray-950 to-gray-900 text-white px-4">

  <div class="w-full max-w-md bg-gray-900/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-gray-800">

    <h2 class="text-3xl font-bold text-center mb-2">
      @if (isLoginMode()) { Welcome Back 👋 } @else { Create Account 🚀 }
    </h2>

    <p class="text-center text-gray-400 mb-6 text-sm">
      @if (isLoginMode()) { Login to continue } @else { Join us today }
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        @if(!isLoginMode()){
        <div>
        <label class="block mb-1 text-sm text-gray-300">Username</label>
            <input
            type="text"
            formControlName="name"
            class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 outline-none transition"

            />
        </div>
    }

      <div>
        <label class="block mb-1 text-sm text-gray-300">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 outline-none transition"
        />
      </div>

      <div>
        <label class="block mb-1 text-sm text-gray-300">Password</label>

        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="w-full p-3 pr-10 rounded-lg bg-gray-800 border border-gray-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 outline-none transition"
          />

          <span
            class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 hover:text-white"
            (click)="togglePassword()"
          >
            @if (showPassword()) { Hide } @else { Show }
          </span>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded-lg font-semibold flex justify-center items-center gap-2 transition disabled:opacity-60"
      >
        @if (loading) {
          <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
          Processing...
        } @else {
          @if (isLoginMode()) { Login } @else { Register }
        }
      </button>

    </form>

    <!-- TOGGLE MODE -->
    <p class="text-center text-sm text-gray-400 mt-6">
      @if (isLoginMode()) {
        Don’t have an account?
        <span class="text-indigo-400 hover:underline cursor-pointer" (click)="toggleMode()">
          Register
        </span>
      } @else {
        Already have an account?
        <span class="text-indigo-400 hover:underline cursor-pointer" (click)="toggleMode()">
          Login
        </span>
      }
    </p>

  </div>
</div>
