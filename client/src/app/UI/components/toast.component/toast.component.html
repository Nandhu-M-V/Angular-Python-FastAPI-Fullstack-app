<div class="fixed top-5 right-5 z-50 space-y-3">

  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="px-4 py-3 rounded-xl shadow-lg text-white flex items-center justify-between gap-4 min-w-63 animate-slideIn"
      [ngClass]="{
        'bg-green-600': toast.type === 'success',
        'bg-red-600': toast.type === 'error',
        'bg-gray-700': toast.type === 'info'
      }"
    >
      <span>{{ toast.message }}</span>

      <button (click)="toastService.remove(toast.id)" class="text-white/70 hover:text-white">
        ✖
      </button>
    </div>
  }

</div>
